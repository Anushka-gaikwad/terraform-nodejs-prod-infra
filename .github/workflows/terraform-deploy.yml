name: "Terraform Deploy"

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - "modules/**"
      - ".github/workflows/terraform-deploy.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - staging
          - production
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.5.7"
  AWS_REGION: "ap-south-1"

jobs:
  # -------------------------------------------------------
  # Job 1: Deploy to Staging (auto on push to main)
  # -------------------------------------------------------
  deploy-staging:
    name: "Deploy Staging"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: staging
    env:
      TF_VAR_FILE: environments/staging.tfvars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=${{ env.TF_VAR_FILE }} -out=staging.tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve staging.tfplan

  # -------------------------------------------------------
  # Job 2: Deploy to Production (manual approval required)
  # -------------------------------------------------------
  deploy-production:
    name: "Deploy Production"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push'
    environment: production
    env:
      TF_VAR_FILE: environments/production.tfvars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=${{ env.TF_VAR_FILE }} -out=production.tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve production.tfplan

  # -------------------------------------------------------
  # Job 3: Manual Deployment (workflow_dispatch)
  # -------------------------------------------------------
  manual-deploy:
    name: "Manual - ${{ github.event.inputs.environment }} (${{ github.event.inputs.action }})"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}
    env:
      TF_VAR_FILE: environments/${{ github.event.inputs.environment }}.tfvars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=${{ env.TF_VAR_FILE }} -out=${{ github.event.inputs.environment }}.tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve ${{ github.event.inputs.environment }}.tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file=${{ env.TF_VAR_FILE }} -auto-approve
